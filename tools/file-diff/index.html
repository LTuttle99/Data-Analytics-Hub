<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Diff — Team Analytics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <header class="border-b border-slate-800 bg-slate-950 px-8 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <a href="../../index.html" class="text-xs text-slate-500 hover:text-teal-400">&larr; Hub</a>
            <div class="h-6 w-px bg-slate-800"></div>
            <h1 class="text-lg font-semibold text-white">File Diff</h1>
        </div>
        <div class="text-xs text-slate-400 bg-slate-900 px-3 py-1 rounded-full border border-slate-800">Row-level comparison</div>
    </header>

    <main class="max-w-6xl mx-auto p-6 space-y-6">
        <p class="text-sm text-slate-400 max-w-2xl">
            Upload two CSV or Excel files, pick a key column that identifies matching rows across
            them, and see what was added, removed, or changed. Runs entirely in your browser.
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-slate-950 border border-slate-800 rounded-xl p-5">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">File A (baseline)</label>
                <input type="file" id="file-a" accept=".csv,.xlsx,.xls" class="block w-full text-sm text-slate-300 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-slate-800 file:text-slate-200 hover:file:bg-slate-700">
                <p id="file-a-status" class="text-xs text-slate-500 mt-2"></p>
            </div>
            <div class="bg-slate-950 border border-slate-800 rounded-xl p-5">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">File B (comparison)</label>
                <input type="file" id="file-b" accept=".csv,.xlsx,.xls" class="block w-full text-sm text-slate-300 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-slate-800 file:text-slate-200 hover:file:bg-slate-700">
                <p id="file-b-status" class="text-xs text-slate-500 mt-2"></p>
            </div>
        </div>

        <div id="controls" class="hidden bg-slate-950 border border-slate-800 rounded-xl p-5 flex flex-wrap items-end gap-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Key Column</label>
                <select id="key-column" class="bg-slate-900 border border-slate-700 rounded-lg text-sm p-2 text-slate-100 min-w-[200px]"></select>
            </div>
            <button onclick="runDiff()" class="bg-teal-500 hover:bg-teal-400 text-slate-950 text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">
                Compare Files
            </button>
        </div>

        <div id="results" class="hidden space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Added</p>
                    <p id="count-added" class="text-2xl font-bold text-emerald-400 mt-1">0</p>
                </div>
                <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Removed</p>
                    <p id="count-removed" class="text-2xl font-bold text-red-400 mt-1">0</p>
                </div>
                <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Changed</p>
                    <p id="count-changed" class="text-2xl font-bold text-amber-400 mt-1">0</p>
                </div>
                <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Unchanged</p>
                    <p id="count-unchanged" class="text-2xl font-bold text-slate-300 mt-1">0</p>
                </div>
            </div>

            <div class="flex gap-2 border-b border-slate-800">
                <button onclick="setTab('changed')" id="tab-changed" class="px-4 py-2 text-sm font-medium border-b-2 border-teal-500 text-white">Changed</button>
                <button onclick="setTab('added')" id="tab-added" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200">Added</button>
                <button onclick="setTab('removed')" id="tab-removed" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200">Removed</button>
                <div class="flex-1"></div>
                <button onclick="exportDiff()" class="text-xs text-teal-400 hover:text-teal-300 font-medium px-2">Export CSV</button>
            </div>

            <div id="table-container" class="overflow-x-auto bg-slate-950 border border-slate-800 rounded-xl p-2"></div>
        </div>
    </main>

    <script src="../shared/parse.js"></script>
    <script>
        let dataA = null;
        let dataB = null;
        let diffResult = null;
        let currentTab = 'changed';

        function showToast(message, isError = true) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `text-sm rounded-lg px-4 py-3 shadow-2xl max-w-md ${isError ? 'bg-red-500/15 border border-red-500/40 text-red-300' : 'bg-emerald-500/15 border border-emerald-500/40 text-emerald-300'}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        document.getElementById('file-a').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                dataA = await parseFileToRows(file);
                document.getElementById('file-a-status').innerText = `${file.name} — ${dataA.rows.length.toLocaleString()} rows, ${dataA.columns.length} columns`;
                maybeShowControls();
            } catch (err) {
                showToast('Could not parse File A: ' + err.message);
            }
        });

        document.getElementById('file-b').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                dataB = await parseFileToRows(file);
                document.getElementById('file-b-status').innerText = `${file.name} — ${dataB.rows.length.toLocaleString()} rows, ${dataB.columns.length} columns`;
                maybeShowControls();
            } catch (err) {
                showToast('Could not parse File B: ' + err.message);
            }
        });

        function maybeShowControls() {
            if (!dataA || !dataB) return;

            const commonColumns = dataA.columns.filter(c => dataB.columns.includes(c));

            if (commonColumns.length === 0) {
                showToast('These files have no column names in common — cannot match rows between them.');
                return;
            }

            const select = document.getElementById('key-column');
            select.innerHTML = commonColumns.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
            document.getElementById('controls').classList.remove('hidden');
        }

        function runDiff() {
            const keyCol = document.getElementById('key-column').value;
            if (!keyCol) return;

            const allColumns = Array.from(new Set([...dataA.columns, ...dataB.columns]));

            const mapA = new Map();
            for (const r of dataA.rows) mapA.set(String(r[keyCol]), r);
            const mapB = new Map();
            for (const r of dataB.rows) mapB.set(String(r[keyCol]), r);

            const added = [];
            const removed = [];
            const changed = [];
            let unchangedCount = 0;

            for (const [key, rowB] of mapB.entries()) {
                if (!mapA.has(key)) {
                    added.push(rowB);
                    continue;
                }
                const rowA = mapA.get(key);
                const changedCols = allColumns.filter(c => c !== keyCol && String(rowA[c] ?? '') !== String(rowB[c] ?? ''));
                if (changedCols.length > 0) {
                    changed.push({ key, rowA, rowB, changedCols });
                } else {
                    unchangedCount++;
                }
            }

            for (const [key, rowA] of mapA.entries()) {
                if (!mapB.has(key)) removed.push(rowA);
            }

            diffResult = { keyCol, allColumns, added, removed, changed, unchangedCount };

            document.getElementById('count-added').innerText = added.length.toLocaleString();
            document.getElementById('count-removed').innerText = removed.length.toLocaleString();
            document.getElementById('count-changed').innerText = changed.length.toLocaleString();
            document.getElementById('count-unchanged').innerText = unchangedCount.toLocaleString();

            document.getElementById('results').classList.remove('hidden');
            setTab('changed');
        }

        function setTab(tab) {
            currentTab = tab;
            ['changed', 'added', 'removed'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = t === tab
                    ? 'px-4 py-2 text-sm font-medium border-b-2 border-teal-500 text-white'
                    : 'px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-200';
            });
            renderTable();
        }

        function renderTable() {
            const container = document.getElementById('table-container');
            if (!diffResult) return;

            if (currentTab === 'added' || currentTab === 'removed') {
                const rows = diffResult[currentTab];
                const cols = diffResult.allColumns;

                if (rows.length === 0) {
                    container.innerHTML = `<p class="text-sm text-slate-500 italic p-6 text-center">No ${currentTab} rows.</p>`;
                    return;
                }

                container.innerHTML = `
                    <table class="w-full text-left text-xs">
                        <thead><tr class="border-b border-slate-800 text-slate-400 uppercase">
                            ${cols.map(c => `<th class="py-2 px-3">${escapeHtml(c)}</th>`).join('')}
                        </tr></thead>
                        <tbody class="divide-y divide-slate-900">
                            ${rows.slice(0, 500).map(r => `<tr>${cols.map(c => `<td class="py-2 px-3 text-slate-300">${escapeHtml(r[c])}</td>`).join('')}</tr>`).join('')}
                        </tbody>
                    </table>
                    ${rows.length > 500 ? `<p class="text-xs text-slate-500 p-3">Showing first 500 of ${rows.length.toLocaleString()} rows — use Export CSV for the full set.</p>` : ''}
                `;
                return;
            }

            const rows = diffResult.changed;
            if (rows.length === 0) {
                container.innerHTML = `<p class="text-sm text-slate-500 italic p-6 text-center">No changed rows.</p>`;
                return;
            }

            container.innerHTML = `
                <table class="w-full text-left text-xs">
                    <thead><tr class="border-b border-slate-800 text-slate-400 uppercase">
                        <th class="py-2 px-3">${escapeHtml(diffResult.keyCol)}</th>
                        <th class="py-2 px-3">Changed Columns</th>
                    </tr></thead>
                    <tbody class="divide-y divide-slate-900">
                        ${rows.slice(0, 500).map(r => `
                            <tr>
                                <td class="py-2 px-3 text-slate-300 font-medium align-top">${escapeHtml(r.key)}</td>
                                <td class="py-2 px-3 align-top">
                                    ${r.changedCols.map(c => `
                                        <div class="mb-1">
                                            <span class="text-slate-500">${escapeHtml(c)}:</span>
                                            <span class="text-red-400">${escapeHtml(r.rowA[c])}</span>
                                            <span class="text-slate-600">&rarr;</span>
                                            <span class="text-emerald-400">${escapeHtml(r.rowB[c])}</span>
                                        </div>
                                    `).join('')}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                ${rows.length > 500 ? `<p class="text-xs text-slate-500 p-3">Showing first 500 of ${rows.length.toLocaleString()} rows — use Export CSV for the full set.</p>` : ''}
            `;
        }

        function exportDiff() {
            if (!diffResult) return;

            if (currentTab === 'added' || currentTab === 'removed') {
                downloadCSV(`diff_${currentTab}.csv`, diffResult.allColumns, diffResult[currentTab]);
                return;
            }

            const cols = ['key', 'changed_column', 'value_in_a', 'value_in_b'];
            const rows = [];
            for (const r of diffResult.changed) {
                for (const c of r.changedCols) {
                    rows.push({ key: r.key, changed_column: c, value_in_a: r.rowA[c], value_in_b: r.rowB[c] });
                }
            }
            downloadCSV('diff_changed.csv', cols, rows);
        }
    </script>
</body>
</html>
